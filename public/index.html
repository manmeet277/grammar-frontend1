<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LingoCorrect | AI Grammar Enhancement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen">

    <div class="container mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-indigo-900 mb-2">LingoCorrect Engine</h1>
            <p class="text-gray-600 italic">Elevate your syntax with AI-driven precision.</p>
        </header>

        <div class="grid md:grid-cols-2 gap-10 max-w-6xl mx-auto">
            <div class="glass-morphism p-8 rounded-2xl shadow-xl">
                <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Draft</h2>
                <textarea id="userInput" 
                    class="w-full h-64 p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-400 outline-none resize-none text-gray-700"
                    placeholder="Enter your text here..."></textarea>
                <button onclick="getCorrection()" 
                    class="mt-6 w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:shadow-lg transform hover:-translate-y-1 transition-all">
                    ANALYZE & REFINE
                </button>
            </div>

            <div class="glass-morphism p-8 rounded-2xl shadow-xl border-t-4 border-indigo-500">
                <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Refined Output</h2>
                <div id="outputContainer" class="h-64 overflow-y-auto p-4 bg-white rounded-xl text-gray-800 leading-relaxed">
                    <span class="text-gray-400 italic">Waiting for input...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function getCorrection() {
            const textInput = document.getElementById('userInput').value;
            const outputArea = document.getElementById('outputContainer');

            if (!textInput.trim()) {
                alert("Please provide some text to analyze.");
                return;
            }

            outputArea.innerHTML = `<span class="animate-pulse text-indigo-600 font-medium">Consulting ML Model...</span>`;

            try {
                // Change 'localhost:8000' to whatever port your FastAPI runs on
                const response = await fetch('https://4b21-34-143-243-99.ngrok-free.app/correct', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textInput })
                });

                if (response.ok) {
                    const data = await response.json();
                    // Assuming your Backend returns { "corrected": "..." }
                    outputArea.innerHTML = `<p class="text-gray-800">${data.corrected}</p>`;
                } else {
                    throw new Error("Backend connection failed.");
                }
            } catch (error) {
                console.error("Error:", error);
                outputArea.innerHTML = `<span class="text-red-500">System Error: Ensure the Backend server is running.</span>`;
            }
        }
    </script>
</body>
</html>
