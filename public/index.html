<script>
    const chatThread = document.getElementById('chatThread');
    const userInput = document.getElementById('userInput');

    const API_URL = "http://127.0.0.1:8000/correct"; // 🔴 CHANGE HERE

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';

        const loadingId = addLoadingIndicator();

        try {
            const response = await fetch('https://b679-34-16-193-43.ngrok-free.app/correct', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            if (!response.ok) {
                throw new Error("Server error: " + response.status);
            }

            const data = await response.json();
            removeLoadingIndicator(loadingId);

            appendMessage(data.corrected, 'ai');

        } catch (error) {
            console.error(error);
            removeLoadingIndicator(loadingId);

            appendMessage(
                "⚠️ Backend not reachable. Make sure FastAPI is running.",
                'ai',
                true
            );
        }

        chatThread.scrollTop = chatThread.scrollHeight;
    }

    function appendMessage(content, sender, isError = false) {
        const div = document.createElement('div');
        div.className = sender === 'user' ? 'flex justify-end' : 'flex justify-start';

        const innerDiv = document.createElement('div');
        innerDiv.className = sender === 'user'
            ? 'bg-indigo-600 text-white rounded-2xl rounded-tr-none p-4 max-w-[80%]'
            : `bg-white border shadow-sm rounded-2xl rounded-tl-none p-4 max-w-[80%] ${isError ? 'text-red-500' : 'text-slate-700'}`;

        innerDiv.innerHTML = content;
        div.appendChild(innerDiv);
        chatThread.appendChild(div);
    }

    function addLoadingIndicator() {
        const id = 'loading-' + Date.now();
        const div = document.createElement('div');
        div.id = id;
        div.className = 'flex justify-start';
        div.innerHTML = `<div class="bg-slate-200 animate-pulse rounded-2xl p-4 text-slate-500 text-xs">AI is refining your text...</div>`;
        chatThread.appendChild(div);
        return id;
    }

    function removeLoadingIndicator(id) {
        const element = document.getElementById(id);
        if (element) element.remove();
    }
</script>
