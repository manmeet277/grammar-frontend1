<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoCorrect AI | Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .chat-container { height: calc(100vh - 180px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 overflow-hidden">

    <header class="p-4 bg-white border-b flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold">L</div>
            <h1 class="text-xl font-semibold text-slate-800 tracking-tight">LingoCorrect <span class="text-indigo-600 text-sm">v1.0</span></h1>
        </div>
        <span class="text-xs font-medium px-2 py-1 bg-green-100 text-green-700 rounded-full">System Online</span>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div id="chatThread" class="chat-container overflow-y-auto custom-scrollbar space-y-4 p-4">
            <div class="flex justify-start">
                <div class="bg-white border shadow-sm rounded-2xl rounded-tl-none p-4 max-w-[80%] text-slate-700">
                    Hello! I am your <strong>Grammar Enhancement Engine</strong>. Paste your text below, and I will refine it with sophisticated vocabulary.
                </div>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full bg-white border-t p-4">
        <div class="max-w-4xl mx-auto flex gap-3">
            <input type="text" id="userInput" 
                class="flex-1 p-3 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400 transition-all"
                placeholder="Type your error-prone text here..."
                onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" 
                class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition shadow-md">
                Send
            </button>
        </div>
    </footer>
<script>
    const chatThread = document.getElementById('chatThread');
    const userInput = document.getElementById('userInput');    

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';

        const loadingId = addLoadingIndicator();

        try {
            const response = await fetch('https://2ade-8-229-118-50.ngrok-free.app/correct', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            if (!response.ok) {
                throw new Error("Server error: " + response.status);
            }

            const data = await response.json();
            removeLoadingIndicator(loadingId);

            appendMessage(data.corrected, 'ai');

        } catch (error) {
            console.error(error);
            removeLoadingIndicator(loadingId);

            appendMessage(
                "⚠️ Backend not reachable. Make sure FastAPI is running.",
                'ai',
                true
            );
        }

        chatThread.scrollTop = chatThread.scrollHeight;
    }

    function appendMessage(content, sender, isError = false) {
        const div = document.createElement('div');
        div.className = sender === 'user' ? 'flex justify-end' : 'flex justify-start';

        const innerDiv = document.createElement('div');
        innerDiv.className = sender === 'user'
            ? 'bg-indigo-600 text-white rounded-2xl rounded-tr-none p-4 max-w-[80%]'
            : `bg-white border shadow-sm rounded-2xl rounded-tl-none p-4 max-w-[80%] ${isError ? 'text-red-500' : 'text-slate-700'}`;

        innerDiv.innerHTML = content;
        div.appendChild(innerDiv);
        chatThread.appendChild(div);
    }

    function addLoadingIndicator() {
        const id = 'loading-' + Date.now();
        const div = document.createElement('div');
        div.id = id;
        div.className = 'flex justify-start';
        div.innerHTML = `<div class="bg-slate-200 animate-pulse rounded-2xl p-4 text-slate-500 text-xs">AI is refining your text...</div>`;
        chatThread.appendChild(div);
        return id;
    }

    function removeLoadingIndicator(id) {
        const element = document.getElementById(id);
        if (element) element.remove();
    }
</script>
</body>
</html>
